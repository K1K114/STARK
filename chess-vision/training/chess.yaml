# YOLOv8 dataset config for custom 3D-printed chess pieces.
# After downloading from Roboflow, verify that the path below matches
# where the dataset landed (training/train.py downloads to ../data).

path: ../data          # root relative to this yaml file
train: images/train
val: images/val
test: images/test      # optional — remove line if no test split

# Number of classes
nc: 12

# Class names must match the labels in your Roboflow project exactly.
# Adjust if your project uses different naming conventions.
names:
  - white_king
  - white_queen
  - white_rook
  - white_bishop
  - white_knight
  - white_pawn
  - black_king
  - black_queen
  - black_rook
  - black_bishop
  - black_knight
  - black_pawn
